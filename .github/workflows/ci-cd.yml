name: ci-cd

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  APP_NAME: order-service

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Lint (Checkstyle)
        run: mvn -B checkstyle:check

  unit_test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Unit test
        run: mvn -B test

  build_artifact:
    runs-on: ubuntu-latest
    needs: unit_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build jar
        run: mvn -B clean package -DskipTests
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: order-service-jar
          path: target/*.jar

  build_and_push_image:
    runs-on: ubuntu-latest
    needs: build_artifact
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_URI=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO }}/order-service:${IMAGE_TAG}
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for GAR
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: docker build -t ${{ steps.meta.outputs.image_uri }} .

      - name: Push image
        run: docker push ${{ steps.meta.outputs.image_uri }}

  deploy_staging:
    runs-on: ubuntu-latest
    needs: build_and_push_image
    environment: staging
    steps:
      - name: Deploy to staging VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE_URI="${{ needs.build_and_push_image.outputs.image_uri }}"
            docker pull "$IMAGE_URI"
            docker stop order-service || true
            docker rm order-service || true
            docker run -d --name order-service --restart always -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=staging \
              "$IMAGE_URI"

  verify_staging:
    runs-on: ubuntu-latest
    needs: deploy_staging
    steps:
      - name: Verify staging health
        run: |
          curl -f http://${{ secrets.STAGING_HOST }}:8080/actuator/health

