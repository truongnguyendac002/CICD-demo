name: ci-cd

on:
  push:
    branches: [ "main" ]

jobs:
  build_test_and_push_image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test
        run: mvn -B clean package

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_URI=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO }}/order-service:${IMAGE_TAG}
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for GAR
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: docker build -t ${{ steps.meta.outputs.image_uri }} .

      - name: Push image
        run: docker push ${{ steps.meta.outputs.image_uri }}

  deploy_staging:
    runs-on: ubuntu-latest
    needs: build_test_and_push_image
    environment: staging
    steps:
      - name: Deploy to staging VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            REGISTRY="${{ secrets.GCP_REGION }}-docker.pkg.dev"
            IMAGE_URI="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO }}/order-service:${{ github.sha }}"

            if ! command -v gcloud >/dev/null 2>&1; then
              echo "gcloud is not installed on VM. Install google-cloud-cli first."
              exit 1
            fi

            gcloud auth configure-docker "$REGISTRY" --quiet
            gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin "https://$REGISTRY"

            docker pull "$IMAGE_URI"
            docker stop order-service || true
            docker rm order-service || true
            docker run -d --name order-service --restart always -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=staging \
              "$IMAGE_URI"

  verify_staging:
    runs-on: ubuntu-latest
    needs: deploy_staging
    steps:
      - name: Verify staging health
        run: |
          HEALTH_URL="http://${{ secrets.STAGING_HOST }}:8080/actuator/health"
          MAX_RETRIES=12
          SLEEP_SECONDS=10

          for i in $(seq 1 $MAX_RETRIES); do
            if curl -fsS --max-time 5 "$HEALTH_URL" > /dev/null; then
              echo "Staging health check passed on attempt $i/$MAX_RETRIES"
              exit 0
            fi

            echo "Staging health check failed on attempt $i/$MAX_RETRIES, retrying in ${SLEEP_SECONDS}s..."
            sleep $SLEEP_SECONDS
          done

          echo "Staging health check failed after $MAX_RETRIES attempts."
          exit 1

  deploy_production:
    runs-on: ubuntu-latest
    needs: verify_staging
    environment: production
    steps:
      - name: Deploy to production VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            REGISTRY="${{ secrets.GCP_REGION }}-docker.pkg.dev"
            IMAGE_URI="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO }}/order-service:${{ github.sha }}"

            if ! command -v gcloud >/dev/null 2>&1; then
              echo "gcloud is not installed on VM. Install google-cloud-cli first."
              exit 1
            fi

            gcloud auth configure-docker "$REGISTRY" --quiet
            gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin "https://$REGISTRY"

            docker pull "$IMAGE_URI"
            docker stop order-service || true
            docker rm order-service || true
            docker run -d --name order-service --restart always -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              "$IMAGE_URI"

  verify_production:
    runs-on: ubuntu-latest
    needs: deploy_production
    steps:
      - name: Verify production health
        run: |
          HEALTH_URL="http://${{ secrets.PROD_HOST }}:8080/actuator/health"
          MAX_RETRIES=12
          SLEEP_SECONDS=10

          for i in $(seq 1 $MAX_RETRIES); do
            if curl -fsS --max-time 5 "$HEALTH_URL" > /dev/null; then
              echo "Production health check passed on attempt $i/$MAX_RETRIES"
              exit 0
            fi

            echo "Production health check failed on attempt $i/$MAX_RETRIES, retrying in ${SLEEP_SECONDS}s..."
            sleep $SLEEP_SECONDS
          done

          echo "Production health check failed after $MAX_RETRIES attempts."
          exit 1
